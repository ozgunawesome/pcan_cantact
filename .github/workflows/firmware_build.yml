name: Build XCAN firmware

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      #- name: arm-none-eabi-gcc
      #  uses: fiam/arm-none-eabi-gcc@v1
      #  with:
      #    release: '10-2020-q4'
      - name: install toolchain...
        run: sudo apt install -y gcc-arm-none-eabi dfu-util

      - name: build firmware...
        run: make canable
        env:
          MCU_SERIES: "F072"
